{% extends 'storefront/base.html' %}

{% block title %}Регистрация — KCell Online Demo{% endblock %}

{% block content %}
<section class="hero">
  <div class="card">
    <p class="eyebrow">Регистрация</p>
    <h1>Создать аккаунт</h1>
    <a class="button button--secondary" href="/api/register/">Register endpoint</a>
  </div>
  <aside class="card">
    <form method="post" action="/api/register/">
      {% csrf_token %}
      <label>Логин <input type="text" name="username" required></label>
      <label>Email <input type="email" name="email" required></label>
      <label>Пароль <input type="password" name="password" required></label>
      <button class="button button--wide" type="submit">Создать аккаунт</button>
    </form>
  </aside>
</section>
{% endblock %}
