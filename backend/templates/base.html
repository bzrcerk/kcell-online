<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}KCell Online Demo{% endblock %}</title>
  <style>
    :root {
      color: #17251d;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f2;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: #f5f7f2; }
    a { color: inherit; }
    .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 20px 0; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-size: 1.15rem; font-weight: 900; text-decoration: none; }
    .brand span { display: grid; width: 38px; height: 38px; place-items: center; border-radius: 12px; color: #fff; background: #219653; }
    .nav { display: flex; flex-wrap: wrap; gap: 14px; align-items: center; }
    .nav a { color: #1b5f37; font-weight: 800; text-decoration: none; }
    .hero, .layout { display: grid; grid-template-columns: minmax(0, 1fr) 340px; gap: 22px; align-items: start; }
    .hero { margin: 18px 0 22px; }
    .card { border: 1px solid #dfebdf; border-radius: 28px; background: #fff; padding: 24px; }
    .hero .card:first-child { padding: clamp(28px, 6vw, 64px); }
    .eyebrow { margin: 0 0 10px; color: #219653; font-size: .78rem; font-weight: 900; }
    h1, h2, h3, p { margin-top: 0; }
    h1 { max-width: 760px; margin-bottom: 18px; font-size: clamp(2.2rem, 6vw, 4.6rem); line-height: 1; }
    h2 { margin-bottom: 12px; font-size: clamp(1.4rem, 2.5vw, 2rem); }
    h3 { margin-bottom: 6px; font-size: 1rem; }
    p, .muted { color: #607064; line-height: 1.55; }
    code { border-radius: 8px; padding: 2px 6px; background: #edf6ef; color: #17623b; }
    .button { display: inline-flex; min-height: 44px; align-items: center; justify-content: center; border: 0; border-radius: 999px; padding: 0 18px; color: #fff; background: #219653; font: inherit; font-weight: 900; text-decoration: none; cursor: pointer; }
    .button--secondary { color: #1b5f37; background: #e8f4ec; }
    .button--wide { width: 100%; }
    .message { border-radius: 18px; padding: 14px 18px; background: #ecfff4; color: #17623b; font-weight: 800; }
    .product-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; }
    .product-card { overflow: hidden; border: 1px solid #e0ebe2; border-radius: 22px; background: #fff; }
    .product-card img, .detail-image { display: block; width: 100%; aspect-ratio: 16 / 10; object-fit: cover; background: #edf6ef; }
    .product-card__body { display: grid; gap: 10px; padding: 16px; }
    .badge { width: fit-content; border-radius: 999px; padding: 5px 9px; color: #17623b; background: #e4f5ea; font-size: .78rem; font-weight: 900; }
    .price, .total strong { color: #0e7d43; font-size: 1.25rem; font-weight: 900; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; }
    .side { display: grid; gap: 18px; position: sticky; top: 16px; }
    .cart-line { display: grid; grid-template-columns: minmax(0, 1fr) 90px auto; align-items: center; gap: 12px; border: 1px solid #e0ebe2; border-radius: 18px; padding: 12px; }
    .cart-list, form { display: grid; gap: 14px; }
    label { display: grid; gap: 8px; color: #26382c; font-weight: 800; }
    input { width: 100%; border: 1px solid #d7e4d8; border-radius: 14px; padding: 12px 14px; font: inherit; outline: none; }
    input:focus { border-color: #219653; }
    .total { display: flex; justify-content: space-between; border-radius: 16px; padding: 14px; background: #edf6ef; font-weight: 900; }
    .empty { border: 1px dashed #b8d7c2; border-radius: 22px; background: #f8fcf9; padding: 36px; text-align: center; }
    .detail-image { margin-bottom: 18px; border-radius: 22px; }

    @media (max-width: 980px) {
      .hero, .layout, .product-grid { grid-template-columns: 1fr; }
      .side { position: static; }
    }

    @media (max-width: 640px) {
      .container { width: min(100% - 20px, 1180px); }
      .topbar, .actions { align-items: stretch; flex-direction: column; }
      .cart-line { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar container">
    <a class="brand" href="/"><span>K</span>KCell Online Demo</a>
    <nav class="nav" aria-label="Навигация">
      <a href="/api/products/">API товаров</a>
      <a href="/api/carts/">API корзины</a>
      <a href="/api/orders/">API заказов</a>
      <a href="/admin/">Админка</a>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
